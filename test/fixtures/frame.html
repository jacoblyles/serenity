<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Serenity Fixture - Frames</title>
    <style>
      body {
        margin: 0;
        padding: 28px;
        background: #f9fbff;
        color: #20242a;
        font: 16px/1.5 system-ui, sans-serif;
      }

      .frames {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
      }

      iframe {
        width: 100%;
        height: 340px;
        border: 1px solid #b8c2d0;
        border-radius: 8px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <h1>Iframe Behavior</h1>
    <p>The extension injects only into the top frame. The root filter should invert iframe pixels once.</p>
    <div class="frames">
      <iframe title="Light fixture frame" src="light.html"></iframe>
      <iframe title="Dark fixture frame" src="dark.html"></iframe>
    </div>
  </body>
</html>
